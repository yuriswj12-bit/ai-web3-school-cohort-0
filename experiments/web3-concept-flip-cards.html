<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web3 基础概念卡片</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card {
      perspective: 1000px;
      height: 280px;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: center;
      transition: transform 0.6s;
      transform-style: preserve-3d;
      cursor: pointer;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-front {
      background: linear-gradient(135deg, #1e2937, #334155);
      color: white;
    }
    .card-back {
      background: #f8fafc;
      color: #1e2937;
      transform: rotateY(180deg);
      overflow-y: auto;
      text-align: left;
    }
    .concept-name {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    .content {
      font-size: 0.875rem;
      line-height: 1.5;
    }
  </style>
</head>
<body class="bg-slate-950 text-white py-12 px-6">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold mb-3">Web3 基础概念卡片</h1>
      <p class="text-slate-400 text-lg">点击卡片即可翻转查看解释、例子和安全提醒</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="cards-container">
      <!-- 卡片由 JS 动态生成 -->
    </div>
  </div>

  <script>
    const concepts = [
      {
        name: "account",
        explanation: "区块链上的身份单元，记录余额和交易历史。",
        example: "你在 Sepolia 测试网有一个 account，里面有 0.5 ETH。",
        warning: "account 本身不存储私钥，私钥丢失就无法控制这个 account。"
      },
      {
        name: "address",
        explanation: "账户的公开标识符，通常以 0x 开头，像银行卡号。",
        example: "0x8554bDbc600E8E8C6F56121C6Cf13022a7621aEa0 就是你的 Sepolia 地址。",
        warning: "地址可以公开分享，但一定要核对每一位字符，复制粘贴后多检查一次。"
      },
      {
        name: "wallet",
        explanation: "管理私钥和地址的工具，让你和区块链交互。",
        example: "OKX Wallet、MetaMask 都是 wallet。",
        warning: "不要把助记词或私钥输入到任何网站或不明应用。"
      },
      {
        name: "seed phrase",
        explanation: "一组 12 或 24 个英文单词，用于恢复钱包和私钥。",
        example: "你用 12 个单词备份了 OKX Wallet，手机丢了可以用它恢复。",
        warning: "助记词一旦泄露，任何人都能完全控制你的所有资产。这是最高风险点，永远不要截图、云同步或告诉任何人。"
      },
      {
        name: "private key",
        explanation: "账户的真正控制权证明，一串随机字符。",
        example: "私钥可以直接导入钱包，完全掌控对应地址的所有资产。",
        warning: "私钥一旦泄露，资产立即丢失。永远不要分享、截图、存云盘。"
      },
      {
        name: "signature",
        explanation: "用私钥对交易或消息进行加密确认，证明是你本人操作。",
        example: "你在钱包里点击「确认」发送 0.1 ETH，钱包用私钥生成签名。",
        warning: "签名授权后无法撤销。授权前必须看清是哪个合约、授权了什么权限。"
      },
      {
        name: "transaction",
        explanation: "区块链上的一次状态变更操作。",
        example: "从你的地址转 0.1 ETH 到另一个地址，就是一笔 transaction。",
        warning: "交易一旦上链不可逆。发送前必须核对地址和金额。"
      },
      {
        name: "gas",
        explanation: "执行交易或合约所需的手续费，用 ETH 支付。",
        example: "这笔 Sepolia 转账 Gas Price 是 2.1 Gwei，总费 0.000044 ETH。",
        warning: "主网 Gas 费用波动大，设置过高会浪费，过低可能交易卡住或失败。"
      },
      {
        name: "smart contract",
        explanation: "部署在区块链上的自动执行代码。",
        example: "你部署的 Week1Note 合约，调用 setNote 就能在链上写数据。",
        warning: "合约一旦部署就无法修改。调用前必须确认合约地址和函数作用。"
      },
      {
        name: "testnet",
        explanation: "和主网结构相同但不值钱的网络，用于测试。",
        example: "Sepolia 是 Ethereum 的主流测试网。",
        warning: "测试网资产没有价值，但操作流程和主网完全一致，养成好习惯。"
      },
      {
        name: "block explorer",
        explanation: "查看区块链上所有交易和区块的网站。",
        example: "Etherscan 上输入交易哈希就能看到状态、Gas、区块高度。",
        warning: "不要相信浏览器里显示的「已授权」截图，要自己输入哈希验证。"
      },
      {
        name: "EOA / smart account / multisig",
        explanation: "EOA：普通钱包地址，由私钥控制。Smart Account：合约账户，可编程权限。Multisig：多签账户，需要多个私钥共同确认。",
        example: "普通钱包是 EOA，多签钱包需要 3 把钥匙中至少 2 把签名才能动钱。",
        warning: "多签和智能账户权限设置复杂，配置错误可能导致资产永久锁定。"
      }
    ]

    function createCard(concept) {
      const card = document.createElement('div')
      card.className = 'card bg-transparent'
      
      card.innerHTML = `
        <div class="card-inner">
          <!-- 正面 -->
          <div class="card-front shadow-xl flex items-center justify-center">
            <div>
              <div class="text-slate-400 text-xs tracking-[3px] mb-2">WEB3 CONCEPT</div>
              <div class="concept-name">${concept.name}</div>
            </div>
          </div>
          
          <!-- 背面 -->
          <div class="card-back shadow-xl">
            <div>
              <div class="section-title">解释</div>
              <div class="content">${concept.explanation}</div>
              
              <div class="section-title">例子</div>
              <div class="content">${concept.example}</div>
              
              <div class="section-title">安全提醒</div>
              <div class="content text-red-600">${concept.warning}</div>
            </div>
          </div>
        </div>
      `
      
      // 点击翻转
      card.addEventListener('click', () => {
        card.classList.toggle('flipped')
      })
      
      return card
    }

    function renderCards() {
      const container = document.getElementById('cards-container')
      concepts.forEach(concept => {
        const card = createCard(concept)
        container.appendChild(card)
      })
    }

    // 初始化
    renderCards()
  </script>
</body>
</html>
